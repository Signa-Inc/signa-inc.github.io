<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Frame | Разработка игр</title>
    <style>
        /* Основная палитра и шрифты */
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: #03dac6;
            --btn-buy: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }

        /* Шапка */
        header {
            padding: 20px 40px;
            background-color: var(--surface-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        /* Логотип-ссылка с разделением цветов*/
        header .logo {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        header .logo .part-dark {
            color: #ffffff;
        }
        header .logo .part-frame {
            color: var(--primary-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Управление видимостью страниц */
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Кнопки и интерактивные элементы */
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary-color); color: #000; }
        .btn-primary:hover { background-color: #9965f4; transform: translateY(-2px); }
        .btn-secondary { background: #333; color: white; margin-bottom: 20px; border: 1px solid #555; }
        .btn-secondary:hover { background-color: #444; }
        .btn-buy { background: var(--btn-buy); color: white; margin-top: 15px;}
        .btn-buy:hover { background: #ff2a3f; transform: translateY(-2px); }

        /* Сетка проектов */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .project-card {
            background: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.3s;
            border: 1px solid #333;
        }
        .project-card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        
        .project-img { width: 100%; height: 180px; background-color: #2c2c2c; object-fit: cover; }
        .project-info { padding: 20px; }
        
        /* Статусы */
        .status { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #333; display: inline-block; }
        .status.dev { color: #ffeb3b; border: 1px solid #ffeb3b; }
        .status.done { color: var(--accent-color); border: 1px solid var(--accent-color); }

        /* Страница деталей */
        .details-header { display: flex; gap: 40px; margin-top: 20px; flex-wrap: wrap; }
        .details-gallery { flex: 1; display: flex; gap: 10px; overflow-x: auto; min-width: 300px; }
        .gallery-img { width: 400px; height: 250px; background: #2c2c2c; border-radius: 12px; object-fit: cover; border: 1px solid #333;}
        .details-info { flex: 1; background: var(--surface-color); padding: 30px; border-radius: 12px; border: 1px solid #333; min-width: 300px; }
        
        /* Ссылки */
        .links { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .links a { 
            display: inline-block; 
            background-color: #333; 
            color: white; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            transition: background 0.3s; 
        }
        .links a:hover { background-color: #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="navigate('page-home')">
            <span class="part-dark">Dark</span> <span class="part-frame">Frame</span>
        </div>
    </header>

    <div class="container">
        
        <div id="page-home" class="page active">
            <h1 style="font-size: 3em; margin-bottom: 10px;">Unity Game Developer</h1>
            <p style="color: var(--text-secondary); font-size: 1.2em; margin-bottom: 40px;">Разработка игр под мобильные устройства и WebGL. UI архитектура и оптимизация.</p>
            <button class="btn-primary" onclick="navigate('page-projects')">Все проекты</button>
        </div>

        <div id="page-projects" class="page">
            <button class="btn-secondary" onclick="navigate('page-home')">← Назад на главную</button>
            
            <h2 style="margin-bottom: 20px;">Мои проекты</h2>
            <div class="projects-grid" id="projects-container"></div>
        </div>

        <div id="page-details" class="page">
            <button class="btn-secondary" onclick="navigate('page-projects')">← Назад к проектам</button>
            <div class="details-header">
                <div class="details-gallery" id="detail-gallery"></div>
                <div class="details-info">
                    <h1 id="detail-title" style="margin-bottom: 10px;">Название игры</h1>
                    <span id="detail-status" class="status">Статус</span>
                    <p id="detail-desc" style="color: var(--text-secondary); margin-top: 20px; line-height: 1.6;"></p>
                    
                    <div class="links" id="detail-links"></div>
                    <div id="buy-container"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const projects = [
            {
                id: 1,
                title: "Sajdah Helper",
                status: "dev",
                statusText: "В разработке",
                description: "Инновационное Android-приложение, разработанное на Flutter, которое помогает мусульманам безошибочно контролировать количество совершенных суджудов и ракаатов во время молитвы. Используя фронтальную камеру устройства и алгоритмы сравнения кадров, приложение отслеживает движения в реальном времени без необходимости прикасаться к экрану.",
                images: ["https://placehold.co/600x400/2a2a35/FFFFFF?text=Sajdah+Helper+Screen+1", "https://placehold.co/600x400/2a2a35/FFFFFF?text=Sajdah+Helper+Screen+2"],
                links: [
                    { name: "Скачать с RuStore", url: "https://www.rustore.ru/catalog/app/com.darkframe.sajdah_helper" }
                ],
                price: null
            },
            {
                id: 3,
                title: "Эхо Рейса 817",
                status: "dev",
                statusText: "В разработке",
                description: "Сюжетный психологический хоррор на ПК.",
                images: ["https://placehold.co/600x400/2a2a35/FFFFFF?text=Echo+Of+Flight+817"],
                links: [
                    
                ],
                price: null
            },
            {
                id: 2,
                title: "Still",
                status: "done",
                statusText: "Релиз",
                description: "Проект, разработанный специально для game jam на платформе itch.io.",
                images: ["https://placehold.co/600x400/2a2a35/FFFFFF?text=Still+Gameplay"],
                links: [
                    { name: "itch.io", url: "https://dark-frame.itch.io/still" }
                ],
                price: null
            }
        ];

        function navigate(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            if(pageId === 'page-projects') {
                renderProjects();
            }
        }

        function renderProjects() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';

            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => openDetails(p.id);

                const statusClass = p.status === 'dev' ? 'dev' : 'done';

                card.innerHTML = `
                    <img src="${p.images[0]}" class="project-img" alt="${p.title}">
                    <div class="project-info">
                        <h3 style="margin: 0 0 10px 0;">${p.title}</h3>
                        <span class="status ${statusClass}">${p.statusText}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openDetails(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;

            document.getElementById('detail-title').innerText = project.title;
            
            const statusEl = document.getElementById('detail-status');
            statusEl.innerText = project.statusText;
            statusEl.className = `status ${project.status === 'dev' ? 'dev' : 'done'}`;
            
            document.getElementById('detail-desc').innerText = project.description;

            const gallery = document.getElementById('detail-gallery');
            gallery.innerHTML = '';
            project.images.forEach(imgUrl => {
                gallery.innerHTML += `<img src="${imgUrl}" class="gallery-img">`;
            });

            const linksContainer = document.getElementById('detail-links');
            linksContainer.innerHTML = '';
            project.links.forEach(link => {
                linksContainer.innerHTML += `<a href="${link.url}" target="_blank">${link.name}</a>`;
            });

            const buyContainer = document.getElementById('buy-container');
            buyContainer.innerHTML = '';
            if (project.price) {
                buyContainer.innerHTML = `<button class="btn-buy" onclick="alert('Переход к оплате...')">Купить за ${project.price}</button>`;
            }

            navigate('page-details');
        }
    </script>
</body>
</html>
