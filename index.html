<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>SignaInc | Game Dev & Software Studio</title>
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: dark;

            --bg-color: #0b0d12;
            --bg-accent: #131722;
            --surface-color: rgba(22, 27, 38, 0.7);
            --surface-card: #161b26;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(168, 85, 247, 0.4);
            
            --primary-color: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.25);
            --accent-color: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.25);
            
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --btn-buy: #ef4444;
            --btn-buy-hover: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            margin: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(168, 85, 247, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(6, 182, 212, 0.06) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Шапка */
        header {
            padding: 18px 40px;
            background: rgba(11, 13, 18, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        header .logo:hover { transform: scale(1.02); }
        header .logo .part-signa { color: var(--text-main); }
        header .logo .part-inc {
            background: linear-gradient(135deg, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 40px 24px;
            flex-grow: 1;
            width: 100%;
        }

        /* Управление видимостью страниц */
        .page { 
            display: none; 
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .page.active { display: block; }

        @keyframes slideUpFade { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Кнопки */
        button {
            padding: 12px 28px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { 
            background: linear-gradient(135deg, #a855f7, #7c3aed); 
            color: #ffffff; 
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 24px rgba(168, 85, 247, 0.4);
            filter: brightness(1.1);
        }

        .btn-secondary { 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text-main); 
            margin-bottom: 30px; 
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
        }

        .btn-secondary:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }

        .btn-buy { 
            background: var(--btn-buy); 
            color: white; 
            margin-top: 24px;
            width: 100%;
            padding: 14px 28px;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }

        .btn-buy:hover { 
            background: var(--btn-buy-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }

        /* Главная страница */
        #page-home { padding: 20px 0 40px; text-align: left; }

        #page-home h1 {
            font-size: 3.5em !important;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px !important;
            background: linear-gradient(135deg, #ffffff 40%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #page-home p {
            max-width: 650px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Стек технологий */
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 24px 0 36px;
        }

        .tech-tag {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* Теги на карточках проектов */
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
            padding-top: 10px;
        }

        .card-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
        }

        /* Краткое описание проекта в карточке */
        .project-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Блок Анонсов и Релизов */
        .announcements-section {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .news-card {
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.2s;
        }

        .news-card:hover { border-color: rgba(255, 255, 255, 0.2); }
        .news-date { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .news-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
        .news-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }

        .news-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
            width: fit-content;
            transition: all 0.2s ease;
        }

        .news-link-btn:hover {
            color: #c084fc;
            transform: translateX(2px);
        }

        /* Сетка карточек проектов */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .project-card {
            background: var(--surface-card);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .project-card:hover { 
            transform: translateY(-6px); 
            border-color: var(--border-hover); 
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 20px var(--primary-glow);
        }

        .project-img { 
            width: 100%; 
            height: 200px; 
            background-color: #1a1f2c; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .project-card:hover .project-img { transform: scale(1.03); }

        .project-info { 
            padding: 24px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .project-info h3 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }

        /* Статусы */
        .status { 
            font-size: 12px; 
            font-weight: 600;
            padding: 6px 12px; 
            border-radius: 20px; 
            display: inline-flex;
            align-items: center;
            width: fit-content;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .status.dev { 
            color: #facc15; 
            background: rgba(250, 204, 21, 0.1);
            border: 1px solid rgba(250, 204, 21, 0.3); 
        }

        .status.done { 
            color: var(--accent-color); 
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3); 
        }

        /* Страница деталей */
        .details-header { 
            display: flex; 
            gap: 32px; 
            margin-top: 10px; 
            flex-wrap: wrap; 
            align-items: flex-start;
        }

        .details-gallery { 
            flex: 1.2; 
            display: flex; 
            gap: 16px; 
            overflow-x: auto; 
            min-width: 300px; 
            padding-bottom: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) transparent;
            scroll-behavior: smooth;
        }

        .details-gallery::-webkit-scrollbar { height: 6px; }
        .details-gallery::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.4);
            border-radius: 10px;
        }

        /* Единый стиль для карточек медиа в галерее */
        .gallery-img, .gallery-video { 
            width: 420px; 
            height: 260px; 
            background: #1a1f2c; 
            border-radius: 14px; 
            object-fit: cover; 
            border: 1px solid var(--border-color);
            flex-shrink: 0;
            transition: border-color 0.3s;
        }

        .gallery-img:hover, .gallery-video:hover { border-color: rgba(255, 255, 255, 0.2); }

        .details-info { 
            flex: 1; 
            background: var(--surface-card); 
            padding: 32px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            min-width: 300px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .details-info h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }

        .links { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }

        .links a { 
            display: inline-flex; 
            align-items: center;
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text-main); 
            text-decoration: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease; 
        }

        .links a:hover { 
            background: rgba(168, 85, 247, 0.15); 
            border-color: var(--primary-color);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Подвал */
        footer {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding: 24px 40px;
            background: rgba(11, 13, 18, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-info { font-size: 14px; color: var(--text-secondary); }

        .footer-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-contacts, .btn-telegram-channel {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .btn-contacts:hover, .btn-contacts.active,
        .btn-telegram-channel:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px var(--primary-glow);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .footer-contacts-wrapper { position: relative; }

        .contacts-dropdown {
            position: absolute;
            bottom: calc(100% + 12px);
            right: 0;
            background: #161b26;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 220px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 20px var(--primary-glow);
            backdrop-filter: blur(16px);
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px) scale(0.96);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
        }

        .contacts-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .contacts-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .contacts-dropdown a:hover {
            background: rgba(168, 85, 247, 0.15);
            color: #ffffff;
        }

        .contacts-dropdown svg, .btn-telegram-channel svg {
            width: 16px;
            height: 16px;
            stroke: var(--primary-color);
        }

        /* --- Модальное окно обращения по Email --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 13, 18, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px var(--primary-glow);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Инфо-блок с адресом почты */
        .email-info-card {
            background: rgba(11, 13, 18, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
            flex-wrap: wrap;
        }

        .email-address-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .email-icon {
            width: 20px;
            height: 20px;
            stroke: var(--primary-color);
            flex-shrink: 0;
        }

        .email-address {
            font-family: monospace, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            word-break: break-all;
        }

        .btn-copy-email {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(168, 85, 247, 0.12);
            color: var(--text-main);
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s ease;
            flex-shrink: 0;
            font-family: inherit;
        }

        .btn-copy-email:hover {
            background: rgba(168, 85, 247, 0.25);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-copy-email.copied {
            background: rgba(6, 182, 212, 0.2);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn-copy-email svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-modal-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .btn-mailto {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-mailto:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-gmail {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #ffffff;
            border: 1px solid transparent;
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .btn-gmail:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
            filter: brightness(1.1);
        }

        .btn-modal-action svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            .container { padding: 30px 16px; }
            #page-home h1 { font-size: 2.4em !important; }
            .details-header { flex-direction: column; }
            .details-gallery, .details-info { width: 100%; }
            .gallery-img, .gallery-video { width: 100%; height: 220px; }
            footer { padding: 20px; flex-direction: column; align-items: flex-start; }
            .contacts-dropdown { right: auto; left: 0; }
            .modal-content { padding: 24px; }
            .email-info-card { flex-direction: column; align-items: flex-start; }
            .btn-copy-email { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="navigate('page-home')">
            <span class="part-signa">Signa</span><span class="part-inc">Inc</span>
        </div>
    </header>

    <div class="container">
        
        <div id="page-home" class="page active">
            <h1 id="home-title" style="font-size: 3em; margin-bottom: 10px;"></h1>
            <p id="home-desc" style="color: var(--text-secondary); font-size: 1.15em; margin-bottom: 20px;"></p>

            <div class="tech-stack" id="tech-stack-container"></div>

            <button class="btn-primary" onclick="navigate('page-projects')">Смотреть все проекты</button>

            <!-- Блок Анонсов и Релизов -->
            <div class="announcements-section">
                <h2 class="section-title">Анонсы & Релизы</h2>
                <div class="news-grid" id="news-container"></div>
            </div>
        </div>

        <div id="page-projects" class="page">
            <button class="btn-secondary" onclick="navigate('page-home')">Назад на главную</button>
            
            <h2 style="margin-bottom: 20px;">Мои проекты</h2>
            <div class="projects-grid" id="projects-container"></div>
        </div>

        <div id="page-details" class="page">
            <button class="btn-secondary" onclick="navigate('page-projects')">Назад к проектам</button>
            <div class="details-header">
                <div class="details-gallery" id="detail-gallery"></div>
                <div class="details-info">
                    <h1 id="detail-title" style="margin-bottom: 10px;">Название игры</h1>
                    <span id="detail-status" class="status">Статус</span>

                    <p id="detail-desc" style="color: var(--text-secondary); margin-top: 20px; line-height: 1.6;"></p>
                    
                    <div class="links" id="detail-links"></div>
                    <div id="buy-container"></div>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <div class="footer-info">
            © 2026 SignaInc
        </div>

        <div class="footer-actions">
            <a href="https://t.me/Signa_Inc" target="_blank" class="btn-telegram-channel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
                </svg>
                Telegram Канал
            </a>

            <div class="footer-contacts-wrapper">
                <button class="btn-contacts" id="contactsBtn" onclick="toggleContacts(event)">
                    Контакты
                </button>
                <div class="contacts-dropdown" id="contactsDropdown">
                    <a href="https://t.me/SignaInc_Dev" target="_blank">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        Telegram
                    </a>
                    <!-- Вызов модального окна контактов -->
                    <a href="#" onclick="openFeedbackModal(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        Email
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Модальное окно обращения по Email -->
    <div class="modal-overlay" id="feedbackModal" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeFeedbackModal()" aria-label="Закрыть">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <h3 class="modal-title">Связаться по Email</h3>
            <p class="modal-subtitle">Чтобы отправить нам сообщение, напишите прямо на наш почтовый адрес:</p>
            
            <!-- Инфо-блок с почтой -->
            <div class="email-info-card">
                <div class="email-address-wrapper">
                    <svg class="email-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                    <span class="email-address">signainc.dev@gmail.com</span>
                </div>
                <button class="btn-copy-email" id="copyEmailBtn" onclick="copyEmail()">
                    <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                    </svg>
                    <span id="copyBtnText">Скопировать</span>
                </button>
            </div>

            <!-- Кнопки действий -->
            <div class="modal-actions">
                <a href="mailto:signainc.dev@gmail.com" class="btn-modal-action btn-mailto">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h9"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        <path d="M19 16v6"/>
                        <path d="M16 19h6"/>
                    </svg>
                    Открыть почтовый клиент
                </a>
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=signainc.dev@gmail.com" target="_blank" class="btn-modal-action btn-gmail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                        <polyline points="15 3 21 3 21 9"/>
                        <line x1="10" y1="14" x2="21" y2="3"/>
                    </svg>
                    Открыть Gmail
                </a>
            </div>
        </div>
    </div>

    <script>
        let siteData = { profile: {}, news: [], projects: [] };

        async function loadSiteData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Ошибка сети при загрузке JSON');
                siteData = await response.json();
                
                renderProfile();
                renderNews();
            } catch (error) {
                console.error('Не удалось загрузить данные:', error);
            }
        }

        function renderProfile() {
            if (!siteData.profile) return;

            document.getElementById('home-title').innerText = siteData.profile.heading || '';
            document.getElementById('home-desc').innerText = siteData.profile.description || '';

            const techContainer = document.getElementById('tech-stack-container');
            techContainer.innerHTML = '';
            if (siteData.profile.techStack) {
                siteData.profile.techStack.forEach(tech => {
                    techContainer.innerHTML += `<span class="tech-tag">${tech}</span>`;
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSiteData();
        });

        function toggleContacts(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('contactsDropdown');
            const btn = document.getElementById('contactsBtn');
            dropdown.classList.toggle('show');
            btn.classList.toggle('active');
        }

        document.addEventListener('click', (event) => {
            const dropdown = document.getElementById('contactsDropdown');
            const btn = document.getElementById('contactsBtn');
            if (dropdown && !dropdown.contains(event.target) && !btn.contains(event.target)) {
                dropdown.classList.remove('show');
                btn.classList.remove('active');
            }
        });

        /* --- Управление модальным окном Email --- */
        function openFeedbackModal(event) {
            if (event) event.preventDefault();
            
            // Закрываем выпадающее меню контактов
            const dropdown = document.getElementById('contactsDropdown');
            const btn = document.getElementById('contactsBtn');
            if (dropdown) dropdown.classList.remove('show');
            if (btn) btn.classList.remove('active');

            // Показываем модальное окно
            const modal = document.getElementById('feedbackModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeFeedbackModal() {
            const modal = document.getElementById('feedbackModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModalOnOverlay(event) {
            if (event.target === event.currentTarget) {
                closeFeedbackModal();
            }
        }

        // Закрытие по клавише Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeFeedbackModal();
            }
        });

        // Функция копирования почты в буфер обмена с подтверждающей анимацией
        function copyEmail() {
            const email = 'signainc.dev@gmail.com';
            navigator.clipboard.writeText(email).then(() => {
                const btn = document.getElementById('copyEmailBtn');
                const btnText = document.getElementById('copyBtnText');
                const icon = document.getElementById('copyIcon');

                btn.classList.add('copied');
                btnText.innerText = 'Скопировано!';
                icon.innerHTML = `<polyline points="20 6 9 17 4 12"></polyline>`;

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btnText.innerText = 'Скопировать';
                    icon.innerHTML = `<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>`;
                }, 2000);
            }).catch(err => {
                console.error('Не удалось скопировать: ', err);
            });
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            if (!container) return;
            container.innerHTML = '';

            siteData.news.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';

                const hasLink = item.url && item.url.trim() !== '';
                const linkHtml = hasLink 
                    ? `<a class="news-link-btn" href="${item.url}" target="_blank">Подробнее</a>` 
                    : '';

                card.innerHTML = `
                    <div>
                        <div class="news-date">${item.date}</div>
                        <div class="news-title">${item.title}</div>
                        <div class="news-text">${item.text}</div>
                    </div>
                    ${linkHtml}
                `;
                container.appendChild(card);
            });
        }

        const galleryElement = document.getElementById('detail-gallery');
        if (galleryElement) {
            galleryElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                galleryElement.scrollLeft += e.deltaY;
            }, { passive: false });
        }

        function navigate(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            if(pageId === 'page-projects') {
                renderProjects();
            }
        }

        /* Автоматический скан папки на наличие скриншотов (1.webp, 2.webp, 3.webp...) */
        async function getProjectScreenshots(id) {
            const screenshots = [];
            let index = 1;
            const maxLimit = 25; // Предохранитель от бесконечного цикла

            while (index <= maxLimit) {
                const imgUrl = `Screenshots/${id}/${index}.webp`;
                try {
                    const response = await fetch(imgUrl, { method: 'HEAD' });
                    const contentType = response.headers.get('content-type') || '';

                    if (response.ok && !contentType.includes('text/html')) {
                        screenshots.push(imgUrl);
                        index++;
                    } else {
                        break;
                    }
                } catch (err) {
                    break;
                }
            }
            return screenshots;
        }

        /* Рендер списка проектов (с автоматическим путем к cover.webp) */
        function renderProjects() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';

            siteData.projects.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => openDetails(p.id);

                const statusClass = p.status === 'dev' ? 'dev' : 'done';
                const coverUrl = `Screenshots/${p.id}/cover.webp`;

                const tagsHtml = p.tags && p.tags.length > 0
                    ? `<div class="card-tags">
                        ${p.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
                       </div>`
                    : '';

                card.innerHTML = `
                    <img src="${coverUrl}" class="project-img" loading="lazy" alt="${p.title}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/161b26/94a3b8?text=No+Cover';">
                    <div class="project-info">
                        <h3 style="margin: 0;">${p.title}</h3>
                        <span class="status ${statusClass}">${p.statusText}</span>
                        <p class="project-card-desc">${p.shortDescription}</p>
                        ${tagsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        /* Страница деталей с динамическим поиском скриншотов */
        async function openDetails(id) {
            const project = siteData.projects.find(p => p.id === id);
            if (!project) return;

            document.getElementById('detail-title').innerText = project.title;
            
            const statusEl = document.getElementById('detail-status');
            statusEl.innerText = project.statusText;
            statusEl.className = `status ${project.status === 'dev' ? 'dev' : 'done'}`;

            document.getElementById('detail-desc').innerText = project.fullDescription;

            const gallery = document.getElementById('detail-gallery');
            gallery.innerHTML = '';
            gallery.scrollLeft = 0;
            
            // 1. Отрисовка видео
            if (project.video && project.video.trim() !== '') {
                if (project.video.includes('youtube.com') || project.video.includes('youtu.be')) {
                    gallery.innerHTML += `
                        <iframe class="gallery-video" src="${project.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    `;
                } else {
                    gallery.innerHTML += `
                        <video class="gallery-video" controls preload="metadata">
                            <source src="${project.video}">
                            Ваш браузер не поддерживает видео.
                        </video>
                    `;
                }
            }

            // 2. Автоматический поиск и отрисовка скриншотов
            const screenshots = await getProjectScreenshots(id);
            screenshots.forEach(imgUrl => {
                gallery.innerHTML += `<img src="${imgUrl}" class="gallery-img" loading="lazy" alt="${project.title}">`;
            });

            const linksContainer = document.getElementById('detail-links');
            linksContainer.innerHTML = '';
            project.links.forEach(link => {
                linksContainer.innerHTML += `<a href="${link.url}" target="_blank">${link.name}</a>`;
            });

            const buyContainer = document.getElementById('buy-container');
            buyContainer.innerHTML = '';
            if (project.price) {
                buyContainer.innerHTML = `<button class="btn-buy" onclick="alert('Переход к оплате...')">Купить за ${project.price}</button>`;
            }

            navigate('page-details');
            gallery.scrollLeft = 0;
        }
    </script>
</body>
</html>
