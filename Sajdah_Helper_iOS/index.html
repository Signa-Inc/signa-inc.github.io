<!DOCTYPE html>
<html>
<head>
  <base href="/sajdah_helper_ios/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sajdah Helper Web Application">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sajdah Helper">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="icons/Icon-512.png"/>

  <!-- Манифест должен быть статическим для корректного запуска iOS PWA -->
  <link rel="manifest" href="manifest.json">

  <title>Sajdah Helper</title>

  <script>
    (function() {
      // Инициализируем флаг PWA до старта Flutter
      window.isSamplePwaStandalone = !!(
        navigator.standalone ||
        window.matchMedia('(display-mode: standalone)').matches
      );
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</head>
<body style="background-color: #000000;">
</body>
</html>
